services:
  mongodb:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin1234
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db

  mongo-express:
    image: mongo-express
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin1234@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "false"

  backend:
    build: .
    restart: always
    ports:
      - "3001:3001"
    environment:
      MONGO_URI: mongodb://admin:admin1234@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb