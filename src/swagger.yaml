openapi: 3.0.3
info:
  title: Anti-Social Net API
  version: 2.1.0
  description: API REST para la plataforma Anti-Social Net. Migrada a una arquitectura NoSQL utilizando Express, Mongoose y MongoDB.

servers:
  - url: http://localhost:3000
    description: Servidor Local de Desarrollo

tags:
  - name: Users
    description: Operaciones de gestión de usuarios y sub-recursos de perfil
  - name: Followers
    description: Gestión de seguidores y seguidos mediante referencias entre documentos
  - name: Posts
    description: Operaciones de publicaciones, imágenes embebidas, etiquetas e interacciones de likes
  - name: Comments
    description: Operaciones de comentarios con filtrado de fechas por variables de entorno
  - name: Tags
    description: Operaciones del catálogo general de etiquetas del sistema

paths:
  # --- ENDPOINTS DE USERS ---
  /api/users:
    post:
      tags:
        - Users
      summary: Crear User
      description: Registra un nuevo usuario en el sistema validando los campos con Joi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullname:
                  type: string
                nickname:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                birthDate:
                  type: string
                  format: date
                bio:
                  type: string
                  maxLength: 200
                location:
                  type: string
                  maxLength: 100
              example:
                fullname: "Juan Pérez"
                nickname: "juanperez"
                email: "juanperez@gmail.com"
                password: "password123"
                birthDate: "1995-05-15"
                bio: "Desarrollador apasionado por Node.js."
                location: "Buenos Aires, Argentina"
      responses:
        "201":
          description: Usuario creado con éxito.
        "400":
          description: Error de validación (Joi) en los datos enviados.
        "500":
          description: Error al crear usuario.

    get:
      tags:
        - Users
      summary: Obtener Users
      description: Devuelve el listado completo de usuarios registrados en MongoDB.
      responses:
        "200":
          description: Usuarios obtenidos con éxito.
        "500":
          description: Error al obtener usuarios.

  /api/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID único del usuario (MongoDB ObjectId).
        schema:
          type: string
          pattern: "^[0-9a-fA-F]{24}$"
          example: 6a3d3c37d9726fc5cca163f4

    get:
      tags:
        - Users
      summary: Obtener User
      description: Devuelve los datos detallados de un usuario específico incluyendo contadores, bio, ubicación y fechas.
      responses:
        "200":
          description: Usuario obtenido con éxito. En el select se incluyen bio, location, followers, following y createdAt.
        "400":
          description: Formato de ID inválido.
        "404":
          description: Usuario no encontrado.
        "500":
          description: Error al obtener usuario.

    put:
      tags:
        - Users
      summary: Actualizar User
      description: Modifica la información del usuario en MongoDB validando los campos con Joi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullname:
                  type: string
                nickname:
                  type: string
                email:
                  type: string
                password:
                  type: string
                birthDate:
                  type: string
                  format: date
                bio:
                  type: string
                  maxLength: 200
                location:
                  type: string
                  maxLength: 100
              example:
                nickname: pablo
                email: pablogomez@gmail.com
                password: dfg505
                bio: "Nueva biografía actualizada"
                location: "Córdoba, Argentina"
      responses:
        "200":
          description: Usuario actualizado con éxito. Devuelve el objeto de datos completo de respuesta.
        "400":
          description: Error de validación Joi o formato de ID inválido.
        "500":
          description: Error al actualizar usuario.

    delete:
      tags:
        - Users
      summary: Eliminar User
      description: Borra permanentemente el usuario de la base de datos por su ObjectId y ejecuta una limpieza en cascada removiendo su ID de las listas de seguidores/seguidos de todos los demás usuarios del sistema ($pull).
      responses:
        "200":
          description: Usuario y sus relaciones eliminados con éxito.
        "404":
          description: Usuario no encontrado.
        "500":
          description: Error al eliminar usuario.

  # --- ENDPOINTS DE SUB-RECURSOS DE USERS ---
  /api/users/{id}/posts:
    parameters:
      - name: id
        in: path
        required: true
        description: ID único del usuario (MongoDB ObjectId).
        schema:
          type: string
          pattern: "^[0-9a-fA-F]{24}$"
          example: 6a3d3c37d9726fc5cca163f4
    get:
      tags:
        - Users
      summary: Obtener publicaciones de un usuario
      description: Devuelve el listado completo de publicaciones creadas exclusivamente por el usuario especificado.
      responses:
        "200":
          description: Publicaciones del usuario obtenidas con éxito.
        "500":
          description: Error al obtener las publicaciones del usuario.

  /api/users/{id}/comments:
    parameters:
      - name: id
        in: path
        required: true
        description: ID único del usuario (MongoDB ObjectId).
        schema:
          type: string
          pattern: "^[0-9a-fA-F]{24}$"
          example: 6a3d3c37d9726fc5cca163f4
    get:
      tags:
        - Users
      summary: Obtener comentarios de un usuario
      description: Recupera el historial de todos los comentarios que el usuario ha realizado en las distintas publicaciones.
      responses:
        "200":
          description: Comentarios del usuario obtenidos con éxito.
        "500":
          description: Error al obtener los comentarios del usuario.

  /api/users/{id}/likes:
    parameters:
      - name: id
        in: path
        required: true
        description: ID único del usuario (MongoDB ObjectId).
        schema:
          type: string
          pattern: "^[0-9a-fA-F]{24}$"
          example: 6a3d3c37d9726fc5cca163f4
    get:
      tags:
        - Users
      summary: Obtener Me Gusta de un usuario
      description: Devuelve el conjunto de publicaciones (posts) a las que el usuario les ha dado "Me Gusta".
      responses:
        "200":
          description: Posts que le gustan al usuario obtenidos con éxito.
        "500":
          description: Error al obtener los likes del usuario.

  # --- ENDPOINTS DE FOLLOWERS ---
  /api/followers/{userId}/{targetId}:
    parameters:
      - name: userId
        in: path
        required: true
        description: ID del usuario que realiza la acción (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3c37d9726fc5cca163f4
      - name: targetId
        in: path
        required: true
        description: ID del usuario objetivo a seguir/dejar de seguir (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575
    post:
      tags:
        - Followers
      summary: Seguir User
      description: Registra una nueva relación de seguimiento mediante referencias cruzadas en MongoDB.
      responses:
        "201":
          description: Usuario seguido correctamente.
        "400":
          description: Formato de IDs inválido.
        "404":
          description: Uno o ambos usuarios no existen (Integridad Referencial).
        "500":
          description: Error al seguir usuario.
    delete:
      tags:
        - Followers
      summary: Dejar de Seguir User
      description: Remueve el registro de seguimiento entre ambos usuarios.
      responses:
        "200":
          description: Usuario dejado de seguir con éxito.
        "404":
          description: Relación o usuario no encontrado.
        "500":
          description: Error al dejar de seguir usuario.

  /api/followers/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        description: ID del usuario para consultar sus seguidores (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3c37d9726fc5cca163f4
    get:
      tags:
        - Followers
      summary: Obtener Followers
      description: Devuelve el listado de todos los usuarios que siguen al userId actual.
      responses:
        "200":
          description: Lista de seguidores obtenida con éxito.
        "404":
          description: Usuario no encontrado.
        "500":
          description: Error al obtener followers.

  /api/followers/following/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        description: ID del usuario para consultar a quiénes sigue (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3c37d9726fc5cca163f4
    get:
      tags:
        - Followers
      summary: Obtener Seguidos
      description: Devuelve el listado de todos los usuarios a los que el userId actual está siguiendo.
      responses:
        "200":
          description: Lista de usuarios seguidos obtenida con éxito.
        "404":
          description: Usuario no encontrado.
        "500":
          description: Error al obtener following.

  # --- ENDPOINTS DE POSTS ---
  /api/posts:
    post:
      tags:
        - Posts
      summary: Crear Post
      description: Registra una nueva publicación en el sistema asociándola al ObjectId del usuario autor. La descripción es obligatoria.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                user:
                  type: string
              example:
                description: "Hola Mundo desde mi nueva red social documental"
                user: 6a3d3c37d9726fc5cca163f4
      responses:
        "201":
          description: Post creado con éxito.
        "400":
          description: Error de validación (Descripción vacía o ID de usuario inválido).
        "500":
          description: Error interno del servidor al crear el post.
    get:
      tags:
        - Posts
      summary: Obtener Posts
      description: Devuelve el listado general de publicaciones incluyendo sus imágenes, etiquetas y los datos del autor resueltos mediante .populate().
      responses:
        "200":
          description: Lista de posts obtenida con éxito.
        "500":
          description: Error interno del servidor.

  /api/posts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del post (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575
    get:
      tags:
        - Posts
      summary: Obtener Post
      description: Devuelve los datos de una publicación específica resolviendo sus referencias con Populate.
      responses:
        "200":
          description: Post encontrado.
        "400":
          description: Formato de ID inválido.
        "404":
          description: Post no encontrado.
        "500":
          description: Error interno del servidor.
    put:
      tags:
        - Posts
      summary: Actualizar Post
      description: Modifica los campos principales de una publicación existente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  type: string
                  description: ID de Mongoose del usuario dueño del post (Obligatorio por middleware).
                description:
                  type: string
                  description: Nuevo contenido de texto para la descripción de la publicación.
              example:
                user: "6a3d85b6e9c5426beccf58fc"
                description: "Contenido del post original modificado"
      responses:
        "200":
          description: Post actualizado con éxito. Devuelve el objeto populado.
        "400":
          description: Error de validación (ej. falta el campo 'user' que exige el middleware).
        "404":
          description: Post no encontrado en la base de datos.
        "500":
          description: Error interno del servidor al intentar actualizar.
    delete:
      tags:
        - Posts
      summary: Eliminar Post
      description: Borra permanentemente el post de la base de datos de MongoDB.
      responses:
        "200":
          description: Post eliminado con éxito.
        "404":
          description: Post no encontrado.
        "500":
          description: Error interno del servidor al eliminar el post.

  # --- ENDPOINT DE INTERACCIÓN DE ME GUSTA ---
  /api/posts/{id}/like:
    parameters:
      - name: id
        in: path
        required: true
        description: ID único del post (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575
    patch:
      tags:
        - Posts
      summary: Alternar Me Gusta (Toggle Like/Unlike)
      description: Añade o remueve el ID de un usuario dentro del arreglo 'likes' de una publicación específica dependiendo de si existía previamente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  description: ID de Mongoose del usuario que interactúa.
              example:
                userId: "6a3d3c37d9726fc5cca163f4"
      responses:
        "200":
          description: Operación procesada con éxito. Devuelve si el like fue agregado o eliminado.
        "400":
          description: Solicitud incorrecta por falta de userId o formato de ID inválido.
        "404":
          description: Post no encontrado.
        "500":
          description: Error interno al procesar el estado de me gusta.

  # --- ENDPOINTS DE POSTS IMAGES ---
  /api/posts/{id}/images:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del Post al que pertenecen las imágenes (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575
    post:
      tags:
        - Posts
      summary: Agregar Imagenes
      description: Sube una imagen mediante multer y agrega la referencia al subdocumento de imagen dentro del array embebido 'images' del post.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Archivo de imagen a subir.
      responses:
        "201":
          description: Imagen agregada con éxito al documento.
        "400":
          description: El archivo de imagen es obligatorio o formato de ID incorrecto.
        "404":
          description: Post no encontrado.
        "500":
          description: Error interno al agregar imagenes.

  /api/posts/{id}/images/{imageId}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del Post (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575
      - name: imageId
        in: path
        required: true
        description: ID único del subdocumento de la imagen a remover.
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c579
    put:
      tags:
        - Posts
      summary: Actualizar Imagen de un Post
      description: Reemplaza una imagen específica dentro de un post. Permite un archivo físico usando form-data (Multer) o URL mediante un objeto JSON.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  description: Enlace de internet de la nueva imagen a asociar.
              example:
                url: "https://unsplash.com/es/fotos/ordenador-portatil-junto-al-monitor-con-teclado-y-raton-EJMTKCZ00I0"
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Archivo físico de imagen a subir desde la computadora (procesado por Multer).
      responses:
        "200":
          description: Imagen actualizada correctamente. Devuelve el post completo modificado.
        "400":
          description: Error de solicitud (ej. no se envió ni un archivo físico ni una URL de texto).
        "404":
          description: El post o el ID de la imagen específica no fueron encontrados en la base de datos.
        "500":
          description: Error interno en el servidor al intentar procesar o guardar la imagen.
    delete:
      tags:
        - Posts
      summary: Eliminar Imagen
      description: Remueve de forma permanente el subdocumento de imagen especificado del array del post.
      responses:
        "200":
          description: Imagen eliminada con éxito del documento embebido.
        "404":
          description: Post o Imagen no encontrados.
        "500":
          description: Error interno del servidor al eliminar la imagen.

  # --- ENDPOINTS DE POSTS TAGS ---
  /api/posts/{id}/tags:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del Post al que se le quieren gestionar los Tags (Mongoose ObjectId de 24 caracteres).
        schema:
          type: string
          example: 6a3acdf1417ae63ebc709a5f
    post:
      tags:
        - Posts
      summary: Asignar Tags
      description: Reemplaza o asigna un listado completo de Tags directamente en el arreglo interno 'tags' del documento del Post en MongoDB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tagsIds:
                  type: array
                  items:
                    type: string
                    example: 66786c3a1a2b3c4d5e6f7a8b
              example:
                tagsIds:
                  - "6a3acdf1417ae63ebc709a5f"
                  - "66786c3a1a2b3c4d5e6f7a8b"
      responses:
        "200":
          description: Tags asignados al post correctamente.
        "400":
          description: El ID del Post debe ser un formato válido de MongoDB.
        "404":
          description: Post no encontrado.
        "500":
          description: Error al asignar Tags en el Post.

  /api/posts/{id}/tags/{tagId}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del Post (Mongoose ObjectId).
        schema:
          type: string
          example: 6a3acdf1417ae63ebc709a5f
      - name: tagId
        in: path
        required: true
        description: ID del Tag que se quiere asociar o desasociar (Mongoose ObjectId).
        schema:
          type: string
          example: 66786c3a1a2b3c4d5e6f7a8b
    post:
      tags:
        - Posts
      summary: Asociar Tag
      description: Añade un Tag individual al arreglo del Post utilizando el método .addToSet() de Mongoose para evitar elementos duplicados.
      responses:
        "200":
          description: Tag asociado al post correctamente.
        "400":
          description: El ID del Post debe ser un formato válido de MongoDB.
        "404":
          description: Post o Tag no encontrados en las colecciones.
        "500":
          description: Error al asociar o validar el Tag en el Post.
    delete:
      tags:
        - Posts
      summary: Desasociar Tag
      description: Remueve un Tag individual de la lista del Post manipulando el arreglo en memoria mediante el método .filter() de JavaScript y persistiendo con .save().
      responses:
        "200":
          description: Tag desasociado correctamente.
        "400":
          description: El ID del Post debe ser un formato válido de MongoDB.
        "404":
          description: Post o Tag no encontrados.
        "500":
          description: Error al desasociar o validar el Tag del Post.

  # --- ENDPOINTS DE COMMENTS ---
  /api/comments:
    post:
      tags:
        - Comments
      summary: Crear Comment
      description: Registra un nuevo comentario validando la integridad referencial del usuario y del post en MongoDB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                user:
                  type: string
                post:
                  type: string
              example:
                content: "Excelente estructura documental, ¡aguante MongoDB!"
                user: 6a3d3c37d9726fc5cca163f4
                post: 6a3d3da1b2156c7163f5c575
      responses:
        "201":
          description: Comentario creado con éxito.
        "400":
          description: El contenido es necesario o los IDs de Mongoose tienen formato inválido.
        "404":
          description: El usuario o el post especificados no existen.
        "500":
          description: Error al crear el comentario.
    get:
      tags:
        - Comments
      summary: Obtener Comments
      description: Devuelve el listado de comentarios en base al filtro de tiempo dinámico configurado mediante la variable de entorno LIMIT_MONTHS del archivo .env.
      responses:
        "200":
          description: Lista de comentarios vigentes obtenida con éxito.
        "500":
          description: Error al obtener comentarios.

  /api/comments/post/{postId}:
    parameters:
      - name: postId
        in: path
        required: true
        description: ID de Mongoose del post.
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575
    get:
      tags:
        - Comments
      summary: Obtener Comments por Post
      description: Recupera todos los comentarios que pertenecen a un post específico.
      responses:
        "200":
          description: Lista de comentarios del post obtenida con éxito.
        "500":
          description: Error interno al obtener los comentarios.

  /api/comments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del comentario (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c599
    put:
      tags:
        - Comments
      summary: Actualizar Comment
      description: Modifica el contenido de un comentario existente tras validar su ID y la estructura de los datos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  description: Nuevo contenido del comentario.
              example:
                content: "Contenido actualizado del comentario."
      responses:
        "200":
          description: Comentario actualizado con éxito.
        "400":
          description: Error de validación en los datos de actualización.
        "404":
          description: El comentario no fue encontrado en la base de datos.
        "500":
          description: Error interno al actualizar o validar el comentario.
    delete:
      tags:
        - Comments
      summary: Eliminar Comment
      description: Borra permanentemente un comentario por su ObjectId.
      responses:
        "200":
          description: Comentario eliminado correctamente.
        "404":
          description: Comentario no encontrado.
        "500":
          description: Error al eliminar el comentario.

  # --- ENDPOINTS DE TAGS ---
  /api/tags:
    post:
      tags:
        - Tags
      summary: Crear Tag
      description: Registra un nuevo Tag en la base de datos para que luego pueda ser asignado a los Posts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
              example:
                name: "javascript"
      responses:
        "201":
          description: Tag creado con éxito.
        "400":
          description: Error de validación de Mongoose (el nombre ya existe, está vacío o no cumple con el largo de 2 a 30 caracteres).
        "500":
          description: Error al crear el Tag.
    get:
      tags:
        - Tags
      summary: Obtener Tags
      description: Devuelve el listado completo de Tags registrados en el sistema.
      responses:
        "200":
          description: Lista de Tags obtenida con éxito.
        "500":
          description: Error interno del servidor al obtener los Tags.

  /api/tags/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID único del Tag que se desea consultar, editar o eliminar (Mongoose ObjectId de 24 caracteres).
        schema:
          type: string
          example: 6a3acdf1417ae63ebc709a5f
    get:
      tags:
        - Tags
      summary: Obtener Tag
      description: Devuelve la información de un Tag específico usando el middleware de validación de ID para MongoDB.
      responses:
        "200":
          description: Tag encontrado.
        "400":
          description: El ID del Post debe ser un formato válido de MongoDB.
        "404":
          description: Tag no encontrado.
        "500":
          description: Error al obtener el Tag.
    put:
      tags:
        - Tags
      summary: Actualizar Tag
      description: Modifica el nombre de un Tag existente en MongoDB, verificando que no esté duplicado y aplicando las reglas de longitud del modelo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
            example:
              name: "javascript-avanzado"
      responses:
        "200":
          description: Tag actualizado con éxito.
        "400":
          description: Error de validación. El ID tiene formato inválido, el nombre ya existe o no cumple con el largo de 2 a 30 caracteres.
        "404":
          description: Tag no encontrado para actualizar.
        "500":
          description: Error al actualizar el Tag.
    delete:
      tags:
        - Tags
      summary: Eliminar Tag
      description: Borra permanentemente el Tag de la base de datos de MongoDB utilizando su identificador ObjectId.
      responses:
        "200":
          description: Tag eliminado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Tag eliminado correctamente.
        "400":
          description: El ID del Post debe ser un formato válido de MongoDB.
        "404":
          description: Tag no encontrado.
        "500":
          description: Error al eliminar el Tag.