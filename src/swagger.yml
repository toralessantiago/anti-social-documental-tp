openapi: 3.0.3
info:
  title: Anti-Social Net API
  version: 1.0.0
  description: API REST para la plataforma Anti-Social Net. Implementada con Express, Mongoose y base de datos documental MongoDB (TP Estrategias de Persistencia - UNAHUR).

servers:
  - url: http://localhost:3000
    description: Servidor Local de Desarrollo

tags:
  - name: Users
    description: Operaciones de gestión de usuarios
  - name: Followers
    description: Gestión de seguidores y seguidos mediante referencias entre documentos
  - name: Posts
    description: Operaciones de publicaciones, imágenes embebidas y asignación de etiquetas
  - name: Comments
    description: Operaciones de comentarios con filtrado de fechas por variables de entorno
  - name: Tags
    description: Operaciones del catálogo general de etiquetas del sistema

paths:
  # --- ENDPOINTS DE USERS ---
  /api/users:
    post:
      tags:
        - Users
      summary: Crear User
      description: Registra un nuevo usuario en el sistema validando los campos con Joi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                email:
                  type: string
                password:
                  type: string
              example:
                nickname: juan
                email: juanperez@gmail.com
                password: prz123
      responses:
        "201":
          description: Usuario creado con éxito.
        "400":
          description: Error de validación (Joi) en los datos enviados.
        "500":
          description: Error al crear usuario.

    get:
      tags:
        - Users
      summary: Obtener Users
      description: Devuelve el listado completo de usuarios registrados en MongoDB.
      responses:
        "200":
          description: Usuarios obtenidos con éxito.
        "500":
          description: Error al obtener usuarios.

  /api/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID único del usuario (MongoDB ObjectId).
        schema:
          type: string
          pattern: '^[0-9a-fA-F]{24}$'
          example: 6a3d3c37d9726fc5cca163f4

    get:
      tags:
        - Users
      summary: Obtener User
      description: Devuelve los datos de un usuario específico mediante su ObjectId.
      responses:
        "200":
          description: Usuario obtenido con éxito.
        "400":
          description: Formato de ID inválido.
        "404":
          description: Usuario no encontrado.
        "500":
          description: Error al obtener usuario.

    put:
      tags:
        - Users
      summary: Actualizar User
      description: Modifica la información del usuario en MongoDB validando los campos con Joi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                email:
                  type: string
                password:
                  type: string
              example:
                nickname: pablo
                email: pablogomez@gmail.com
                password: dfg505
      responses:
        "200":
          description: Usuario actualizado con éxito.
        "400":
          description: Error de validación Joi o formato de ID inválido.
        "500":
          description: Error al actualizar usuario.

    delete:
      tags:
        - Users
      summary: Eliminar User
      description: Borra permanentemente el usuario de la base de datos por su ObjectId.
      responses:
        "200":
          description: Usuario eliminado con éxito.
        "404":
          description: Usuario no encontrado.
        "500":
          description: Error al eliminar usuario.

  # --- ENDPOINTS DE FOLLOWERS ---
  /api/followers/{userId}/{targetId}:
    parameters:
      - name: userId
        in: path
        required: true
        description: ID del usuario que realiza la acción (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3c37d9726fc5cca163f4
      - name: targetId
        in: path
        required: true
        description: ID del usuario objetivo a seguir/dejar de seguir (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575

    post:
      tags:
        - Followers
      summary: Seguir User
      description: Registra una nueva relación de seguimiento mediante referencias cruzadas en MongoDB.
      responses:
        "201":
          description: Usuario seguido correctamente.
        "400":
          description: Formato de IDs inválido.
        "404":
          description: Uno o ambos usuarios no existen (Integridad Referencial).
        "500":
          description: Error al seguir usuario.

    delete:
      tags:
        - Followers
      summary: Dejar de Seguir User
      description: Remueve el registro de seguimiento entre ambos usuarios.
      responses:
        "200":
          description: Usuario dejado de seguir con éxito.
        "404":
          description: Relación o usuario no encontrado.
        "500":
          description: Error al dejar de seguir usuario.

  /api/followers/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        description: ID del usuario para consultar sus seguidores (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3c37d9726fc5cca163f4

    get:
      tags:
        - Followers
      summary: Obtener Followers
      description: Devuelve el listado de todos los usuarios que siguen al userId actual.
      responses:
        "200":
          description: Lista de seguidores obtenida con éxito.
        "404":
          description: Usuario no encontrado.
        "500":
          description: Error al obtener followers.

  /api/followers/following/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        description: ID del usuario para consultar a quiénes sigue (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3c37d9726fc5cca163f4

    get:
      tags:
        - Followers
      summary: Obtener Seguidos
      description: Devuelve el listado de todos los usuarios a los que el userId actual está siguiendo.
      responses:
        "200":
          description: Lista de usuarios seguidos obtenida con éxito.
        "404":
          description: Usuario no encontrado.
        "500":
          description: Error al obtener following.

  # --- ENDPOINTS DE POSTS ---
  /api/posts:
    post:
      tags:
        - Posts
      summary: Crear Post
      description: Registra una nueva publicación en el sistema asociándola al ObjectId del usuario autor. La descripción es obligatoria.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                user:
                  type: string
              example:
                description: "Hola Mundo desde mi nueva red social documental"
                user: 6a3d3c37d9726fc5cca163f4
      responses:
        "201":
          description: Post creado con éxito.
        "400":
          description: Error de validación (Descripción vacía o ID de usuario inválido).
        "500":
          description: Error interno del servidor al crear el post.

    get:
      tags:
        - Posts
      summary: Obtener Posts
      description: Devuelve el listado general de publicaciones incluyendo sus imágenes, etiquetas y los datos del autor resueltos mediante .populate().
      responses:
        "200":
          description: Lista de posts obtenida con éxito.
        "500":
          description: Error interno del servidor.

  /api/posts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del post (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575

    get:
      tags:
        - Posts
      summary: Obtener Post
      description: Devuelve los datos de una publicación específica resolviendo sus referencias con Populate.
      responses:
        "200":
          description: Post encontrado.
        "400":
          description: Formato de ID inválido.
        "404":
          description: Post no encontrado.
        "500":
          description: Error interno del servidor.

    delete:
      tags:
        - Posts
      summary: Eliminar Post
      description: Borra permanentemente el post de la base de datos de MongoDB.
      responses:
        "200":
          description: Post eliminado con éxito.
        "404":
          description: Post no encontrado.
        "500":
          description: Error interno del servidor al eliminar el post.

  # --- ENDPOINTS DE POSTS IMAGES ---
  /api/posts/{id}/images:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del Post al que pertenecen las imágenes (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575

    post:
      tags:
        - Posts
      summary: Agregar Imagenes
      description: Inserta un nuevo subdocumento de imagen dentro del array embebido 'images' del post (Requerimiento Técnico N°1).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
              example:
                url: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97"
      responses:
        "201":
          description: Imagen agregada con éxito al documento.
        "400":
          description: La URL de la imagen es obligatoria o formato de ID incorrecto.
        "404":
          description: Post no encontrado.
        "500":
          description: Error interno al agregar imagenes.

  /api/posts/{id}/images/{imageId}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del Post (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575
      - name: imageId
        in: path
        required: true
        description: ID único del subdocumento de la imagen a remover.
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c579

    delete:
      tags:
        - Posts
      summary: Eliminar Imagen
      description: Remueve de forma permanente el subdocumento de imagen especificado del array del post.
      responses:
        "200":
          description: Imagen eliminada con éxito del documento embebido.
        "404":
          description: Post o Imagen no encontrados.
        "500":
          description: Error interno del servidor al eliminar la imagen.

  # --- ENDPOINTS DE POSTS TAGS ---
  /api/posts/{id}/tags:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del Post (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575

    post:
      tags:
        - Posts
      summary: Asignar Tags
      description: Reemplaza por completo el array de referencias de etiquetas del post.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tagsIds:
                  type: array
                  items:
                    type: string
              example:
                tagsIds: ["6a3d3da1b2156c7163f5c575", "6a3d3da1b2156c7163f5c580"]
      responses:
        "200":
          description: Tags asignados al post correctamente.
        "404":
          description: Post no encontrado.
        "500":
          description: Error al asignar tags en el post.

  /api/posts/{id}/tags/{tagId}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del Post (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c575
      - name: tagId
        in: path
        required: true
        description: ID de la etiqueta a asociar/desasociar (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c580

    post:
      tags:
        - Posts
      summary: Asociar Tag
      description: Añade una referencia de etiqueta individual al array del post evitando duplicados mediante el uso de addToSet en Mongoose.
      responses:
        "200":
          description: Tag asociado al post correctamente.
        "400":
          description: Formato de ID inválido.
        "404":
          description: Post o Tag no encontrados (Integridad Referencial).
        "500":
          description: Error al asociar el tag en el post.

    delete:
      tags:
        - Posts
      summary: Desasociar Tag
      description: Remueve la referencia de la etiqueta del array del post usando el método nativo .pull() de Mongoose, sin eliminar el Tag original del catálogo.
      responses:
        "200":
          description: Tag desasociado correctamente.
        "404":
          description: Post o Tag no encontrados.
        "500":
          description: Error al desasociar el tag del post.

  # --- ENDPOINTS DE COMMENTS ---
  /api/comments:
    post:
      tags:
        - Comments
      summary: Crear Comment
      description: Registra un nuevo comentario validando la integridad referencial del usuario y del post en MongoDB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                user:
                  type: string
                post:
                  type: string
              example:
                content: "Excelente estructura documental, ¡aguante MongoDB!"
                user: 6a3d3c37d9726fc5cca163f4
                post: 6a3d3da1b2156c7163f5c575
      responses:
        "201":
          description: Comentario creado con éxito.
        "400":
          description: El contenido es necesario o los IDs de Mongoose tienen formato inválido.
        "404":
          description: El usuario o el post especificados no existen.
        "500":
          description: Error al crear el comentario.

    get:
      tags:
        - Comments
      summary: Obtener Comments
      description: Devuelve el listado de comentarios en base al filtro de tiempo dinámico configurado mediante la variable de entorno LIMIT_MONTHS del archivo .env.
      responses:
        "200":
          description: Lista de comentarios vigentes obtenida con éxito.
        "500":
          description: Error al obtener comentarios.

  /api/comments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del comentario (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c599

    delete:
      tags:
        - Comments
      summary: Eliminar Comment
      description: Borra permanentemente un comentario por su ObjectId.
      responses:
        "200":
          description: Comentario eliminado correctamente.
        "404":
          description: Comentario no encontrado.
        "500":
          description: Error al eliminar el comentario.

  # --- ENDPOINTS DE TAGS ---
  /api/tags:
    post:
      tags:
        - Tags
      summary: Crear Tag
      description: Registra un nuevo tag único en el catálogo del sistema usando el middleware verificarTagDuplicado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              example:
                name: "backend"
      responses:
        "201":
          description: Tag creado con éxito.
        "400":
          description: El tag ya existe o el nombre no cumple con los caracteres mínimos requeridos.
        "500":
          description: Error al crear el tag.

    get:
      tags:
        - Tags
      summary: Obtener Tags
      description: Devuelve el listado completo de etiquetas registradas en MongoDB.
      responses:
        "200":
          description: Lista de tags obtenida con éxito.
        "500":
          description: Error interno del servidor al obtener los tags.

  /api/tags/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del tag (MongoDB ObjectId).
        schema:
          type: string
          example: 6a3d3da1b2156c7163f5c580

    get:
      tags:
        - Tags
      summary: Obtener Tag
      description: Devuelve la información de una etiqueta específica usando el middleware genérico validarTagId.
      responses:
        "200":
          description: Tag encontrado de forma exitosa.
        "400":
          description: El ID del tag no es un formato válido de MongoDB.
        "404":
          description: Tag no encontrado.
        "500":
          description: Error al obtener el tag.

    delete:
      tags:
        - Tags
      summary: Eliminar Tag
      description: Borra permanentemente una etiqueta del sistema por su ObjectId.
      responses:
        "200":
          description: Tag eliminado correctamente del catálogo.
        "400":
          description: Formato de ID inválido.
        "404":
          description: Tag no encontrado.
        "500":
          description: Error al eliminar el tag.